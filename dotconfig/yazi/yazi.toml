[opener]
edit = [
    { run = 'nvim "$@"', block = true, desc = "Neovim", for = "unix" }
]

[open]
prepend_rules = [
    { url = "*.conf", use = "edit" },
    { url = "*.ini", use = "edit" },
    { url = "*.yaml", use = "edit" },
    { url = "*.yml", use = "edit" },
    { url = "*.toml", use = "edit" },
    { url = "*.md", use = "edit" },
    { mime = "text/*", use = "edit" }
]
