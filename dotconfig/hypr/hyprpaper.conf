# Hyprpaper Wallpaper Configuration

# Preload your wallpaper image from the wallpapers folder
preload = ~/Pictures/wallpapers/default.jpg

# Set the wallpaper for your monitor(s) (leaving empty before comma applies to all monitors)
wallpaper = ,~/Pictures/wallpapers/default.jpg

# Disable splash text rendering over the wallpaper
splash = false

# Disable IPC to save resources/battery
# ipc = off
