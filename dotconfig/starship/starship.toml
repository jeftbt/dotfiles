# Starship Prompt Configuration (Tokyo Night Theme)

# General settings
format = """$directory$git_branch$git_status$python$nodejs$rust$golang$java$cmd_duration$line_break$character"""
add_newline = true

# Prompt character
[character]
success_symbol = "[❯](bold #7aa2f7)"
error_symbol = "[❯](bold #f7768e)"

# Directory
[directory]
style = "bold #7dcfff"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "bold #f7768e"

# Git Branch
[git_branch]
symbol = " "
style = "bold #bb9af7"
format = "[$symbol$branch(:$remote_branch)]($style) "

# Git Status
[git_status]
style = "bold #e0af68"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

# Command Duration
[cmd_duration]
min_time = 2_000
style = "bold #565f89"
format = "[$duration]($style) "

# Language indicators
[python]
symbol = " "
style = "bold #e0af68"
format = "[$symbol$version]($style) "

[nodejs]
symbol = " "
style = "bold #9ece6a"
format = "[$symbol$version]($style) "

[rust]
symbol = " "
style = "bold #f7768e"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style = "bold #7dcfff"
format = "[$symbol$version]($style) "

[java]
symbol = " "
style = "bold #f7768e"
format = "[$symbol$version]($style) "
