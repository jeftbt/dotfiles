# Starship Prompt Configuration (Catppuccin Mocha Theme)

# General settings
format = """$directory$git_branch$git_status$python$nodejs$rust$golang$java$cmd_duration$line_break$character"""
add_newline = true

# Prompt character
[character]
success_symbol = "[❯](bold #94e2d5)"
error_symbol = "[❯](bold #f38ba8)"

# Directory
[directory]
style = "bold #89dceb"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "bold #f38ba8"

# Git Branch
[git_branch]
symbol = " "
style = "bold #cba6f7"
format = "[$symbol$branch(:$remote_branch)]($style) "

# Git Status
[git_status]
style = "bold #f9e2af"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

# Command Duration
[cmd_duration]
min_time = 2_000
style = "bold #6c7086"
format = "[$duration]($style) "

# Language indicators
[python]
symbol = " "
style = "bold #f9e2af"
format = "[$symbol$version]($style) "

[nodejs]
symbol = " "
style = "bold #a6e3a1"
format = "[$symbol$version]($style) "

[rust]
symbol = " "
style = "bold #f38ba8"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style = "bold #89dceb"
format = "[$symbol$version]($style) "

[java]
symbol = " "
style = "bold #f38ba8"
format = "[$symbol$version]($style) "
